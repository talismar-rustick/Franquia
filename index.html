<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Localizador de Franquias</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Ícones -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="background-effects">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>

    <main class="app-container">
        <header class="header">
            <div class="header-icon">
                <i class="ri-search-eye-line"></i>
            </div>
            <h1>Localizador de <span>Franquias</span></h1>
            <p>Encontre lojas e copie o ID rapidamente</p>
        </header>

        <section class="search-section">
            <div class="input-group">
                <label for="franchise-select">Franquia</label>
                <div class="select-wrapper">
                    <i class="ri-store-2-line input-icon"></i>
                    <select id="franchise-select">
                        <option value="">Selecione uma franquia...</option>
                        <!-- Options filled via JS -->
                    </select>
                    <i class="ri-arrow-down-s-line arrow-icon"></i>
                </div>
            </div>

            <div class="input-group">
                <label for="store-search">Buscar Loja ou Cidade</label>
                <div class="input-wrapper">
                    <i class="ri-search-2-line input-icon"></i>
                    <input type="text" id="store-search" placeholder="Digite o nome da loja..." disabled>
                    <button id="clear-search" class="clear-btn" hidden><i class="ri-close-line"></i></button>
                </div>
            </div>
        </section>

        <section class="results-section">
            <div class="results-header">
                <span id="results-count">0 lojas encontradas</span>
            </div>
            <div id="results-list" class="results-list">
                <!-- Cards filled via JS -->
                <div class="empty-state">
                    <i class="ri-store-3-line"></i>
                    <p>Selecione uma franquia para ver as lojas.</p>
                </div>
            </div>
        </section>
    </main>

    <div id="toast-container" class="toast-container"></div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
